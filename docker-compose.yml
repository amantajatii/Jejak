services:
  api:
    build:
      context: .
      dockerfile: infrastructure/docker/api.Dockerfile
    environment:
      APP_VERSION: local-compose
      HOST: 0.0.0.0
      LOG_LEVEL: info
      NODE_ENV: production
      PARTNER_MODE: SANDBOX
      PORT: 4000
      WEB_ORIGIN: http://localhost:3000
    ports:
      - "4000:4000"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
