name: Backend contracts

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.3
      - uses: actions/setup-node@v4
        with:
          node-version: 24.10.0
          cache: pnpm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: tests/contract/python/requirements.txt
      - run: pnpm install --frozen-lockfile
      - run: python -m pip install -r tests/contract/python/requirements.txt
      - run: pnpm --filter @jejak/domain validate
      - run: pnpm --filter @jejak/domain fixtures:validate
      - run: pnpm --filter @jejak/domain vectors:verify
      - run: pnpm --filter @jejak/api openapi:lint
      - run: pnpm --dir apps/api db:migrations:check
      - run: pnpm contracts:check
      - run: pnpm contracts:drift-test
      - run: python -m pytest tests/contract/python -q
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: pnpm --filter web build
      - run: docker compose config
      - run: pnpm container:smoke

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          GITLEAKS_VERSION: 8.30.1

  supabase-foundation:
    if: github.event_name != 'pull_request' && vars.JEJAK_RUN_SUPABASE_TESTS == 'true'
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.JEJAK_TEST_DATABASE_URL }}
      JEJAK_ALLOW_TEST_PROJECT_MUTATION: "true"
      NODE_ENV: test
      SUPABASE_SECRET_KEY: ${{ secrets.JEJAK_TEST_SUPABASE_SECRET_KEY }}
      SUPABASE_URL: ${{ secrets.JEJAK_TEST_SUPABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.3
      - uses: actions/setup-node@v4
        with:
          node-version: 24.10.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --dir apps/api test:integration:supabase
      - run: pnpm --dir apps/api test:integration:supabase-storage
