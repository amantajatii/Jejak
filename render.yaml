services:
  - type: web
    name: jejak-api
    runtime: node
    rootDir: .
    buildCommand: pnpm install --frozen-lockfile && bash scripts/build-render.sh
    startCommand: pnpm --filter @jejak/api start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: HOST
        value: "0.0.0.0"
      - key: LOG_LEVEL
        value: info
      - key: PARTNER_MODE
        value: SANDBOX
      # These must be set in Render dashboard:
      # DATABASE_URL, SUPABASE_URL, SUPABASE_SECRET_KEY, SUPABASE_PUBLISHABLE_KEY,
      # SUPABASE_JWT_ISSUER, SUPABASE_JWKS_URL, WEB_ORIGIN, JEJAK_ADMIN_API_KEY,
      # Stellar contract IDs, etc.
  - type: web
    name: risk-service
    runtime: python
    rootDir: apps/risk-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.risk_service.app:app --host 0.0.0.0 --port $PORT
